    :root { --line: #4a9eff; --node: #2563eb; --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --muted: #94a3b8; }
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 1.5rem; line-height: 1.5; }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    .repo-link { color: var(--line); text-decoration: none; font-size: 0.95rem; }
    .repo-link:hover { text-decoration: underline; }
    .meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
    .graph { position: relative; padding-right: 1rem; }
    .commit { position: relative; display: flex; gap: 1rem; margin-bottom: 0.35rem; padding: 0.4rem 0; }
    .commit::before { content: ''; position: absolute; right: 0.45rem; top: 1.1rem; bottom: -0.35rem; width: 2px; background: var(--line); opacity: 0.6; }
    .commit:last-child::before { display: none; }
    .node { flex-shrink: 0; width: 12px; height: 12px; border-radius: 50%; background: var(--node); margin-top: 0.25rem; border: 2px solid var(--bg); box-shadow: 0 0 0 1px var(--line); }
    .body { flex: 1; min-width: 0; }
    .hash { font-family: ui-monospace, monospace; font-size: 0.8rem; color: var(--muted); margin-left: 0.5rem; }
    .hash a { color: var(--line); text-decoration: none; }
    .hash a:hover { text-decoration: underline; }
    .msg { font-weight: 500; word-break: break-word; }
    .author, .date { font-size: 0.8rem; color: var(--muted); }
  </style>
</head>
